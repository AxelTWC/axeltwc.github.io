name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-site

      - name: Checkout research repo
        uses: actions/checkout@v4
        with:
          repository: AxelTWC/research
          token: ${{ secrets.GITHUB_TOKEN }}
          path: research-site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            main-site/my-app/package-lock.json
            research-site/package-lock.json

      - name: Install & build main portfolio
        run: |
          cd main-site/my-app
          npm ci
          npm run build
        env:
          CI: false

      - name: Install & build research hub
        run: |
          cd research-site
          npm ci
          npm run build
        env:
          CI: false

      - name: Combine builds
        run: |
          mkdir -p main-site/my-app/build/research
          cp -r research-site/dist/* main-site/my-app/build/research/
          cp research-site/public/Reports/*.pdf main-site/my-app/build/research/Reports/ 2>/dev/null || true
          cp research-site/public/Reports/*.html main-site/my-app/build/research/Reports/ 2>/dev/null || true
          cp research-site/public/Reports/*.png main-site/my-app/build/research/Reports/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: main-site/my-app/build
          cname: axeltang.me
